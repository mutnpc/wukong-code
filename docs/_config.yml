title: Wukong Code
description: Terminal AI coding agent — launch an interactive TUI or run one-off prompts without leaving your shell.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

# Theme settings
color_scheme: dark
search_enabled: true
search.heading_level: 2
heading_anchors: true

# Navigation
nav_sort: case_sensitive
nav_external_links:
  - title: GitHub
    url: https://github.com/mutnpc/wukong-code
    hide_icon: false
  - title: Website
    url: https://wukong.today
    hide_icon: false

# Aux links (top right)
aux_links:
  "Wukong Code on GitHub":
    - "https://github.com/mutnpc/wukong-code"

# Footer
footer_content: "&copy; Wukong Code. Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>."

# SEO
url: https://docs.wukong.today
baseurl: ""

# Exclude files
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
