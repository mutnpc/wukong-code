title: Wukong Code Docs
description: Wukong Code documentation — terminal AI coding agent with /verify /scan /proof, local loops, and wukong today.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Theme settings
color_scheme: wukong
logo: "/assets/images/logo-mark.png"
favicon_ico: "/favicon.ico"
search_enabled: true
search.heading_level: 2
heading_anchors: true
callouts:
  note:
    color: green
  highlight:
    color: green

# Navigation
nav_sort: case_sensitive
nav_external_links:
  - title: Wukong Code Website
    url: https://wukong.today
    hide_icon: false
  - title: Download Wukong Code
    url: https://wukong.today/download
    hide_icon: false
  - title: GitHub
    url: https://github.com/mutnpc/wukong-code
    hide_icon: false

# Footer
footer_content: '&copy; <a href="https://wukong.today">Wukong Code</a> · <a href="https://wukong.today/download">Download</a> · <a href="https://github.com/mutnpc/wukong-code">GitHub</a>'

# SEO
url: https://docs.wukong.today
baseurl: ""

# Exclude files
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
