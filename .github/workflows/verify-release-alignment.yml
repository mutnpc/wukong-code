name: Verify Release Version Alignment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to verify (e.g. v0.0.8)'
        required: true

permissions:
  contents: read

jobs:
  verify-version-alignment:
    name: Verify release tag matches the public changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve-tag
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.release_tag }}"
          # Strip leading 'v' if present for semver comparison
          NORMALIZED="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "normalized=$NORMALIZED" >> "$GITHUB_OUTPUT"

      - name: Resolve public release version
        id: resolve-public-version
        run: |
          VERSION=$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | sed -E 's/^## \[([^]]+)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "error: could not extract the latest public version from CHANGELOG.md"
            exit 1
          fi
          echo "public_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wukong-code changelog version: $VERSION"
          echo "wukong-code release tag: ${{ steps.resolve-tag.outputs.tag }}"

      - name: Verify versions match
        run: |
          RELEASE_VERSION="${{ steps.resolve-tag.outputs.normalized }}"
          PUBLIC_VERSION="${{ steps.resolve-public-version.outputs.public_version }}"
          if [ "$RELEASE_VERSION" != "$PUBLIC_VERSION" ]; then
            echo "error: version mismatch"
            echo "  wukong-code release tag: v$RELEASE_VERSION"
            echo "  wukong-code changelog version: $PUBLIC_VERSION"
            echo ""
            echo "Fix: publish the matching CHANGELOG.md entry before creating the release."
            exit 1
          fi
          echo "Versions aligned: $PUBLIC_VERSION"
